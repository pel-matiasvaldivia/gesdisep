services:
  db:
    image: postgres:16-alpine
    container_name: gesdisep-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gesdisep
      POSTGRES_PASSWORD: gesdisep
      POSTGRES_DB: gesdisep
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gesdisep"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gesdisep-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Almacenamiento de documentos S3-compatible (opcional en desarrollo)
  minio:
    image: minio/minio:latest
    container_name: gesdisep-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gesdisep
      MINIO_ROOT_PASSWORD: gesdisep123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  db-data:
  redis-data:
  minio-data:
