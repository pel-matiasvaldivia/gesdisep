name: CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ── Calidad: instalar, typecheck y build de todos los paquetes ──
  quality:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build paquete compartido
        run: pnpm --filter @gesdisep/shared build
      - name: Generar Prisma Client
        run: pnpm --filter @gesdisep/api exec prisma generate
      - name: Typecheck
        run: |
          pnpm --filter @gesdisep/shared typecheck
          pnpm --filter @gesdisep/api typecheck
          pnpm --filter @gesdisep/web typecheck
      - name: Build API
        run: pnpm --filter @gesdisep/api build
      - name: Build Web
        run: pnpm --filter @gesdisep/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ── E2E: migración + arranque de la API + smoke test contra Postgres ──
  e2e:
    name: E2E smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gesdisep
          POSTGRES_PASSWORD: gesdisep
          POSTGRES_DB: gesdisep
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gesdisep"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://gesdisep:gesdisep@localhost:5432/gesdisep?schema=public
      JWT_SECRET: ci-secret
      CREDENCIAL_QR_SECRET: ci-qr-secret
      API_PORT: "3001"
      PUBLIC_VERIFY_URL: http://localhost:3000/verificar
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Preparar backend
        run: |
          pnpm --filter @gesdisep/shared build
          pnpm --filter @gesdisep/api exec prisma generate
          pnpm --filter @gesdisep/api build
      - name: Migrar y sembrar
        working-directory: apps/api
        run: |
          pnpm exec prisma migrate deploy
          pnpm exec ts-node prisma/seed.ts
      - name: Arrancar API y ejecutar smoke test
        working-directory: apps/api
        run: |
          node dist/src/main.js & echo $! > /tmp/api.pid
          for i in $(seq 1 30); do curl -sf http://localhost:3001/api/credenciales/verificar/x >/dev/null 2>&1 && break; sleep 1; done
          set -e
          B=http://localhost:3001/api
          TOK=$(curl -s -X POST $B/auth/login -H 'Content-Type: application/json' \
            -d '{"email":"empresa@ejemplo.com","password":"gesdisep123"}' \
            | node -e "let b='';process.stdin.on('data',d=>b+=d).on('end',()=>{const j=JSON.parse(b);if(!j.accessToken){console.error('login falló:',b);process.exit(1)}console.log(j.accessToken)})")
          test -n "$TOK" && echo "login OK"
          LEG=$(curl -s -X POST $B/prestadores -H "Authorization: Bearer $TOK" -H 'Content-Type: application/json' \
            -d '{"tipo":"HUMANA","tipoPersona":"PERSONA_JURIDICA","razonSocial":"CI SA","cuit":"30-71000000-5","domicilioSocial":"Calle Falsa 123, Mendoza","domicilioElectronico":"ci@ci.com","telefono":"2610000000"}' \
            | node -e "let b='';process.stdin.on('data',d=>b+=d).on('end',()=>{const j=JSON.parse(b);if(!j.legajo){console.error('respuesta inesperada:',b);process.exit(1)}console.log(j.legajo.id)})")
          test -n "$LEG" && echo "registro OK (legajo $LEG)"
          curl -sf $B/credenciales/verificar/tokeninvalido | grep -q '"valida":false' && echo "verificador QR OK"
          kill "$(cat /tmp/api.pid)" || true

  # ── Deploy: build y push de imágenes a GitHub Container Registry ──
  docker:
    name: Build & push images (ghcr.io)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login a ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata API
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-api
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Metadata Web
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            API_INTERNAL_URL=${{ vars.API_INTERNAL_URL || 'http://api:3001' }}
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
